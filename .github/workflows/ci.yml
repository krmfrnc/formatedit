name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema prisma/schema.prisma
      - run: pnpm --filter @formatedit/api exec tsc --noEmit
      - run: pnpm --filter @formatedit/web exec tsc --noEmit

  test-api-unit:
    name: API Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema prisma/schema.prisma
      - name: Run unit tests with coverage
        working-directory: apps/api
        run: pnpm jest --config jest.config.ts --coverage --forceExit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-coverage
          path: apps/api/coverage/unit/

  test-api-e2e:
    name: API E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec prisma generate --schema prisma/schema.prisma
      - name: Run E2E tests with coverage
        working-directory: apps/api
        run: pnpm jest --config jest-e2e.config.ts --coverage --forceExit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-coverage
          path: apps/api/coverage/e2e/

  test-web:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run web tests
        working-directory: apps/web
        run: pnpm vitest run --coverage
