services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.example
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx pnpm install && npx pnpm --filter @formatedit/api dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file: .env.example
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npx pnpm install && npx pnpm --filter @formatedit/web dev"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: formatedit
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    command: server /data --console-address ':9001'
    volumes:
      - minio-data:/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - '8080:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api

volumes:
  postgres-data:
  minio-data:
